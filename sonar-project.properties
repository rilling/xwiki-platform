# Unique identifiers from your SonarCloud project setup
sonar.projectKey=your_project_key
sonar.organization=your_org_name
sonar.host.url=https://sonarcloud.io

# TARGETING: This is the most important part
# Only scan the 'oldcore' module to save time and line-count
sonar.sources=xwiki-platform-core/xwiki-platform-oldcore/src/main/java
sonar.java.binaries=target/classes

# EXCLUSIONS: Skip tests and third-party code to keep the report clean
sonar.exclusions=**/test/**, **/target/**